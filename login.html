<!DOCTYPE html>
<html lang="pt-br" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Simulador Avalia (Atricon) 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            font-family: 'Inter', sans-serif;
        }
        .card {
            border-radius: 15px;
            width: 350px;
            border: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>
    <div class="card p-4 text-center">
        <i class="bi bi-shield-lock-fill text-primary" style="font-size: 3rem;"></i>
        <h4 class="fw-bold mt-3">Acesso Restrito</h4>
        <p class="text-muted small">Simulador Avalia (Atricon)</p>
        
        <input type="password" id="senhaLogin" class="form-control mb-3 text-center" placeholder="Digite a senha">
        <button id="btnEntrar" class="btn btn-primary w-100 fw-bold" onclick="fazerLogin()">Entrar</button>
        
        <div id="erroLogin" class="text-danger small mt-2" style="display: none;">Senha incorreta!</div>
    </div>

    <script>
        // Esse script conversa direto com o servidor da Vercel
        async function fazerLogin() {
            const btn = document.getElementById('btnEntrar');
            const senha = document.getElementById('senhaLogin').value;
            const erro = document.getElementById('erroLogin');

            btn.innerText = "Verificando...";
            btn.disabled = true;
            erro.style.display = 'none';

            // Manda a senha para o nosso segurança invisível no servidor
            const res = await fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ senha })
            });

            if (res.ok) {
                // Se a senha estiver certa, o servidor nos dá o crachá e entramos no sistema
                window.location.href = '/'; 
            } else {
                // Se errar, mostra o erro e reseta o botão
                erro.style.display = 'block';
                btn.innerText = "Entrar";
                btn.disabled = false;
            }
        }

        // Permite logar apertando Enter
        document.getElementById('senhaLogin').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') fazerLogin();
        });
    </script>
</body>
</html>
