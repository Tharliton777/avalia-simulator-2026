<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Assesi - Avalia Simulator 2026</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-light">

    <div id="telaLista" class="container py-5 page-transition">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <div class="d-flex align-items-center">
                <div class="logo-container me-3">
                    <img src="logo.png" alt="Logo" onerror="this.src='https://via.placeholder.com/50'">
                </div>
                <div>
                    <h2 class="fw-bold text-primary mb-0">Avalia Simulator (ATRICON 2026)</h2>
                    <p class="text-muted mb-0">Gerencie o progresso Assesi Brasil.</p>
                </div>
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-outline-primary btn-sm" onclick="exportarBackup()">📤 Exportar</button>
                <label class="btn btn-outline-secondary btn-sm mb-0">
                    📥 Importar <input type="file" hidden onchange="importarBackup(event)">
                </label>
            </div>
        </div>

        <div class="card shadow-sm border-0 mb-4">
            <div class="card-body">
                <div class="input-group">
                    <input type="text" id="inputNovoCliente" class="form-control" placeholder="Nome da nova Prefeitura ou Câmara...">
                    <button class="btn btn-success" onclick="cadastrarCliente()">+ Cadastrar</button>
                </div>
            </div>
        </div>

        <div class="row" id="gridClientes"></div>
    </div>

    <div id="telaAvaliacao" class="container py-5 d-none page-transition">
        <div class="mb-4">
            <button class="btn btn-sm btn-secondary mb-3 shadow-sm" onclick="voltarParaLista()">← Voltar para Lista</button>
            <div class="d-flex justify-content-between align-items-center bg-white p-3 rounded shadow-sm border-start border-4 border-primary">
                <h2 id="nomeEntidadeTitulo" class="fw-bold mb-0 text-dark">Nome da Entidade</h2>
                <div id="badgeSeloFinal" class="badge p-3 fs-6 shadow-sm">Calculando...</div>
            </div>
        </div>

        <div class="row">
            <div class="col-md-4">
                <div class="card shadow-sm border-0 sticky-top" style="top: 20px;">
                    <div class="card-body text-center">
                        <h5 class="card-title text-muted">Índice de Transparência</h5>
                        <h1 class="display-4 fw-bold text-primary" id="textoPorcentagem">0%</h1>
                        <div class="progress mb-3" style="height: 12px;">
                            <div id="barraProgresso" class="progress-bar progress-bar-striped progress-bar-animated bg-success" style="width: 0%"></div>
                        </div>
                        <div id="infoEssenciais" class="small p-2 rounded"></div>
                    </div>
                </div>
            </div>

            <div class="col-md-8">
                <div class="card shadow-sm border-0">
                    <div class="card-header bg-dark text-white fw-bold d-flex justify-content-between">
                        <span>Checklist de Transparência (PNTP 2026)</span>
                        <span class="badge bg-danger">Essenciais Marcados com *</span>
                    </div>
                    <ul class="list-group list-group-flush" id="containerCriterios"></ul>
                </div>
            </div>
        </div>
    </div>

    <footer class="py-4 mt-5 border-top bg-white">
        <div class="container text-center">
            <p class="text-muted mb-0">© 2026 Avalia Simulator - Todos os direitos reservados</p>
            <small class="text-primary fw-bold">Assesi Brasil</small>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
